[test]
preload = ["./test-setup.ts"]
# Coverage thresholds apply when running bun test --coverage (enforced in CI).
# Bun only reports files actually executed during the test run, so the
# threshold measures quality across the files that have tests.
coverageThreshold = 0.80
# createPaymentSource/chargeRecurringPayment (the real Wompi HTTP calls) can't
# be unit tested alongside lib/subscription.test.ts's mock of the same module
# — bun:test's mock.module() replaces modules process-wide, not per file. See
# LES-263. Excluded here rather than left permanently failing the threshold.
coveragePathIgnorePatterns = ["**/lib/wompi.ts"]
